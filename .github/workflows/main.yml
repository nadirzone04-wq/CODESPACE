name: macOS-Desktop-VNC

on:
  workflow_dispatch:

jobs:
  macos-desktop:
    runs-on: macos-12
    timeout-minutes: 3600

    steps:
      - name: Instalar y conectar Tailscale
        run: |
          echo "🔑 Instalando Tailscale..."
          brew install tailscale
          
          # Iniciar el servicio de Tailscale en segundo plano
          sudo tailscaled > /dev/null 2>&1 &
          sleep 5
          
          # Autenticar Tailscale usando tu secreto
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-$GITHUB_RUN_ID
          
          # Guardar la IP para mostrarla luego
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Activar Escritorio Remoto Nativo (VNC)
        run: |
          echo "🖥️ Activando Screen Sharing en macOS..."
          # Este comando es el oficial de Apple para forzar la activación del VNC con una contraseña
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvnclegacy -vnclegacy yes -clientopts -setvncpw -vncpw 12345678 -restart -agent -privs -all

      - name: Mantener la conexión abierta
        run: |
          echo -e "\n=== macOS Remote Desktop Activo ==="
          echo "🌐 IP de Tailscale: $TAILSCALE_IP"
          echo "🖥️  Conéctate usando un cliente VNC (como VNC Viewer, o Screen Sharing en otro Mac)"
          echo "🔑 Contraseña VNC: 12345678"
          echo -e "===================================\n"
          
          # Bucle para mantener la máquina encendida
          while true; do
              echo "[$(date)] Escritorio activo..."
              sleep 300
          done
