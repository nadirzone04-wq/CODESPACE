name: Docker-macOS-Ubuntu

on:
  workflow_dispatch:

jobs:
  run-macos-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: 🔑 Instalar y conectar Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-ubuntu-docker
          echo "TAILSCALE_IP=$(tailscale ip -4)" >> $GITHUB_ENV

      - name: 🍎 Iniciar macOS en Docker
        run: |
          echo "Descargando y arrancando el contenedor de macOS..."
          # Lo ejecutamos en segundo plano (-d) y abrimos el puerto 8006
          sudo docker run -d -p 8006:8006 -e KVM=N dockur/macos
          
      - name: 🌐 Mantener vivo y mostrar enlace
        run: |
          echo -e "\n=== Docker macOS Activo ==="
          echo "⚠️ ADVERTENCIA: Sin KVM, esto será EXTREMADAMENTE lento."
          echo "🌐 Abre tu navegador web y entra en: http://$TAILSCALE_IP:8006"
          echo -e "===========================\n"
          
          # Bucle para mantener la máquina encendida
          while true; do
              echo "[$(date)] Esperando a que el Mac arranque a pedales..."
              sleep 300
          done
